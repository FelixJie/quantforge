name: Build Android APK

# 云端编译 QuantForge 手机 App(Capacitor + Android)。
# 触发:手动(Actions 页面 Run workflow)或推到 master 且 web/ 有改动。
# 产物:debug APK,在本次运行的 Artifacts 里下载,可直接装到自己手机(需开"允许未知来源")。
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build web (app mode → 指向云端 API)
        working-directory: web
        run: npm run build:app

      - name: Capacitor sync android
        working-directory: web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quantforge-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
