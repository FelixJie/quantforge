name: asset_injection
display_name: 资产注入预期
description: |
  大股东承诺将优质资产注入上市公司，预期重大资产重组带来估值重构机会。

screener:
  category: multi_factor
  category_color: "#8b5cf6"
  icon: package
  risk: 高
  suitable: 重组行情、政策宽松期
  holding_period: 1-3个月
  filters:
    min_price: 3.0
    max_pe: 200.0
  factor_weights:
    momentum: 4
    liquidity: 4
    value: 2
    pb: 1
    quality: 0
    size: 3
    large_cap: 0
    graham: 0
    value_composite: 0
    float_ratio: 4
  top_n: 15

entry_conditions:
  - 大股东或实控人有优质未上市资产
  - 上市公司近期与大股东有资产往来披露
  - 机构调研频繁且持仓有所增加
  - 股价处于低位（近两年相对低点）

exit_conditions:
  - 重组预案被否或宣告终止
  - 或股价连续强势上涨后缺乏基本面支撑
  - 或盈利超过 30%
  - 或亏损超过 10%

execution:
  strategy_class: event_driven
  strategy_params:
    event_type: asset_injection

parameters:
  stop_loss_pct: 0.10
  take_profit_pct: 0.30

risk_notes: |
  资产注入存在重大不确定性，需控制仓位，不可重仓押注。监管审查严格，周期较长。
