name: earnings_pre_disclosure
display_name: 业绩预告超预期
description: |
  公司发布正面业绩预告（预增/扭亏），且预期增幅大幅超过市场预期，短期确定性催化。

screener:
  category: multi_factor
  category_color: "#8b5cf6"
  icon: trending-up
  risk: 中
  suitable: 季报/年报披露季前后
  holding_period: 1-3周
  filters:
    min_price: 3.0
    max_pe: 150.0
  factor_weights:
    momentum: 5
    liquidity: 4
    value: 2
    pb: 0
    quality: 3
    size: 2
    large_cap: 0
    graham: 0
    value_composite: 0
    float_ratio: 3
  top_n: 20

entry_conditions:
  - 发布正面业绩预告（预增>50%或扭亏）
  - 预告净利润高于分析师一致预期20%以上
  - 公告后当日未大幅高开（溢价<5%）
  - 行业整体景气支撑个股业绩

exit_conditions:
  - 正式财报公布后"买预期卖事实"
  - 或盈利超过 15%
  - 或亏损超过 6%

execution:
  strategy_class: event_driven
  strategy_params:
    event_type: earnings_preannounce

parameters:
  min_profit_growth: 0.50
  analyst_beat_ratio: 0.20
  max_open_premium: 0.05
  stop_loss_pct: 0.06
  take_profit_pct: 0.15

risk_notes: |
  业绩预告为初步估算，存在最终报告与预告偏差的风险，业绩不及预告时需及时止损。
