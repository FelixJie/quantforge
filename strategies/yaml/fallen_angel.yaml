name: fallen_angel
display_name: 坠落天使修复
description: |
  曾经的行业龙头因短期负面事件（丑闻、业绩暴雷、行业政策打压）
  股价大幅下跌，但护城河仍在的"坠落天使"。
  等待负面情绪充分消化后的困境反转，往往有超额回报。

screener:
  category: reversal
  category_color: "#9333ea"
  icon: arrow-down-circle
  risk: 高
  suitable: 行业政策打压过后、短期事件冲击消散期、机构重新覆盖时
  holding_period: 2-6个月
  filters:
    min_price: 3.0
    max_pe: 60.0
    min_pe: 3.0
  factor_weights:
    quality: 8
    value: 7
    pb: 6
    value_composite: 5
    graham: 4
    large_cap: 4
    momentum: -2
    liquidity: 4
    size: 2
    float_ratio: 2
  top_n: 10

entry_conditions:
  - 曾经是行业前三名（历史高点市值 > 200 亿）
  - 较历史高点跌幅 > 60%（充分超跌）
  - 当前 PB < 2（低于历史估值中枢的 40%）
  - 近两个季度业绩下滑已收窄或出现企稳（困境出现拐点）
  - 负面事件明确（监管处罚、业绩暴雷等），而非系统性商业模式失败
  - 核心竞争力仍存：品牌/技术/市场份额未出现不可逆转破坏

exit_conditions:
  - 恢复到负面事件发生前市值的 50%（修复到位）
  - 核心竞争力出现不可逆破坏（逻辑证伪）
  - 监管持续加码且无明确改善时间表

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 20
    slow_period: 60

parameters:
  historical_cap_min: 200.0
  drawdown_from_high: 0.60
  pb_max: 2.0
  recovery_target: 0.50
  stop_loss_pct: 0.12
  take_profit_pct: 0.60
  max_hold_days: 120

risk_notes: |
  坠落天使策略赢面大但需要深度研究，"护城河仍在"的判断至关重要。
  部分坠落天使是估值泡沫破裂而非事件打压，这类不适合此策略。
  仓位需严格控制（单只 < 5%），因为也可能持续下跌至退市。
