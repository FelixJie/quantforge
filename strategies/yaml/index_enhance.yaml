name: index_enhance
display_name: 指数增强
description: |
  以沪深300为基准，超配近期相对强于指数的成分股，
  同时低配或规避相对弱势成分，追求超额收益（Alpha）。

screener:
  category: value
  category_color: "#14b8a6"
  icon: layers
  risk: 低中
  suitable: 震荡市、结构性行情、长线稳健配置
  holding_period: 1-3个月
  filters:
    min_price: 5.0
    max_pe: 40.0
    min_pe: 5.0
    max_pb: 5.0
  factor_weights:
    quality: 8
    large_cap: 8
    value: 6
    value_composite: 5
    momentum: 5
    pb: 4
    liquidity: 6
    graham: 3
    size: 0
    float_ratio: 1
  top_n: 30

entry_conditions:
  - 沪深300 或 中证500 成分股（流动性和机构覆盖有保障）
  - 近 20 日相对指数超额收益 > 2%（相对强势）
  - ROE > 12%，PE 低于行业均值
  - 机构评级近 3 个月有上调
  - 股价位于 MA20 以上（短期趋势健康）

exit_conditions:
  - 相对指数超额收益转为负值（-3% 以上）
  - 调出沪深300/中证500 成分股
  - 机构评级大幅下调

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 20
    slow_period: 60

parameters:
  index_member: true
  relative_strength_days: 20
  relative_strength_min: 0.02
  roe_min: 12.0
  stop_loss_pct: 0.08
  take_profit_pct: 0.20
  rebalance_period: 20

risk_notes: |
  指数增强策略跟踪误差小，适合作为底仓配置。
  建议持仓分散：20-30 只股票，单只不超过总仓位 5%。
  定期再平衡（每月一次），防止持仓偏离度过大。
