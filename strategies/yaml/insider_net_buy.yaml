name: insider_net_buy
display_name: 高管净增持
description: |
  董事、监事、高级管理人员用真实资金增持公司股票，
  是最强烈的内部人看好信号。筛选多位高管同时增持、
  增持金额较大且增持价高于当前股价的标的。

screener:
  category: value
  category_color: "#b45309"
  icon: user-check
  risk: 低中
  suitable: 任何市场环境、公司价值被低估时
  holding_period: 1-6个月
  filters:
    min_price: 3.0
    max_pe: 50.0
    min_pe: 3.0
  factor_weights:
    quality: 9
    value: 8
    graham: 5
    value_composite: 6
    pb: 5
    large_cap: 3
    momentum: 2
    liquidity: 3
    size: 2
    float_ratio: 1
  top_n: 20

entry_conditions:
  - 近 30 日内 2 名以上高管/董监事增持公司股票
  - 合计增持金额 > 500 万元（金额具有实质意义）
  - 增持均价 ≥ 当前股价的 95%（高管买入价与当前价差不多，非已涨过去）
  - 增持来源为高管自有资金（非行权期权、非定增配套）
  - 公司近两年无重大亏损，ROE > 8%

exit_conditions:
  - 高管开始出现减持申报（内部人信心转变）
  - 股价相对增持均价已上涨超过 30%（增持成本充分覆盖）
  - 基本面出现实质恶化

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 20
    slow_period: 60

parameters:
  insider_count_min: 2
  total_amount_min: 5000000
  price_vs_current: 0.95
  self_funded: true
  roe_min: 8.0
  stop_loss_pct: 0.08
  take_profit_pct: 0.30

risk_notes: |
  高管增持有时是"托市"行为（股价跌太多被迫增持），需甄别动机。
  增持公告后有 6 个月锁定期，高管无法立即卖出，信号更可信。
  小额增持（< 100 万）仅为示范性意义，实质信号弱，需过滤。
