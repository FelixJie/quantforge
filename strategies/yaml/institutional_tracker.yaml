name: institutional_tracker
display_name: 机构调研跟踪
description: |
  上市公司接受机构密集调研往往先于股价上涨。
  筛选近 30 日调研机构数量 > 10 家且调研后股价未大幅上涨的标的，
  捕捉机构建仓前的提前布局机会。

screener:
  category: growth
  category_color: "#7c3aed"
  icon: search
  risk: 中
  suitable: 机构调研密集期、季报前后、行业景气上行初期
  holding_period: 2-8周
  filters:
    min_price: 5.0
    max_pe: 60.0
    min_pe: 5.0
  factor_weights:
    quality: 9
    value: 6
    momentum: 5
    value_composite: 5
    pb: 3
    graham: 3
    liquidity: 4
    large_cap: 3
    size: 2
    float_ratio: 2
  top_n: 20

entry_conditions:
  - 近 30 日内接受机构调研次数 > 3 次（调研热度高）
  - 调研机构中包含知名公募基金（非仅本地小型私募）
  - 调研后 5 个交易日内股价涨幅 < 5%（机构尚未大量建仓）
  - 公司 ROE > 12%，净利润增速 > 15%（值得机构关注的基本面）
  - 流通市值 30-300 亿（机构可建仓的合理规模）

exit_conditions:
  - 机构开始大量持仓并公告（信息充分公开，提前布局价值消失）
  - 股价相对调研日上涨 > 20%
  - 调研热度骤降（机构判断逻辑发生变化）

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 10
    slow_period: 30

parameters:
  survey_count_min: 3
  survey_window_days: 30
  post_survey_gain_max: 0.05
  roe_min: 12.0
  profit_growth_min: 15.0
  float_cap_range: [30.0, 300.0]
  stop_loss_pct: 0.08
  take_profit_pct: 0.20

risk_notes: |
  调研信息公开有延迟，实际调研时机构可能已建仓完毕。
  机构调研不等于一定买入，部分调研是基于负面尽调目的。
  需关注调研机构质量，头部公募调研比小型私募调研信号更强。
