name: pb_roe_matrix
display_name: PB-ROE矩阵
description: |
  利用 PB-ROE 二维矩阵寻找"被低估的高质量"公司：
  ROE 高但 PB 低于同类公司，说明市场定价未充分反映其盈利能力。

screener:
  category: value
  category_color: "#7c3aed"
  icon: grid
  risk: 低中
  suitable: 任何市场环境均适用，尤其是价值风格占优时期
  holding_period: 1-6个月
  filters:
    min_price: 5.0
    max_pe: 40.0
    min_pe: 5.0
    max_pb: 3.0
  factor_weights:
    quality: 10
    pb: 9
    value: 8
    value_composite: 7
    graham: 5
    large_cap: 3
    momentum: 2
    liquidity: 3
    size: 1
    float_ratio: 1
  top_n: 20

entry_conditions:
  - ROE(TTM) > 15%，且近 3 年 ROE 标准差 < 5%（稳定高盈利）
  - PB 低于同行业中位数的 0.7 倍（相对低估）
  - PB/ROE 比值低于行业均值（综合性价比高）
  - 净利润增速 > 10%，成长性有保障
  - 无重大负债风险（资产负债率 < 60%）

exit_conditions:
  - PB 升至行业中位数以上（低估修复完成）
  - ROE 连续两季度下滑至 10% 以下
  - 估值显著高于行业合理水平

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 20
    slow_period: 60

parameters:
  roe_min: 15.0
  roe_stability_std: 5.0
  pb_vs_industry_ratio: 0.70
  profit_growth_min: 10.0
  debt_ratio_max: 60.0
  stop_loss_pct: 0.08
  take_profit_pct: 0.25

risk_notes: |
  PB 低可能因为行业整体低估（银行、地产），并非个股独有优势。
  需在同行业内比较 PB-ROE，避免跨行业比较失真。
  高 ROE 若来自高财务杠杆，需警惕杠杆风险而非真实盈利能力。
