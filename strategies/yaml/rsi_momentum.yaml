name: rsi_momentum
display_name: RSI趋势动量
description: |
  RSI在50以上维持强势并持续上行，结合价格站稳均线，追踪中期上升动量。
  适合牛市中期追涨强势股，回避震荡市。

screener:
  category: momentum
  category_color: "#f59e0b"
  icon: trending-up
  risk: 中
  suitable: 牛市中期、强势行情
  holding_period: 2-6周
  filters:
    min_price: 5.0
    max_pe: 120.0
    min_pe: 5.0
  factor_weights:
    momentum: 8
    liquidity: 3
    value: 1
    pb: 0
    quality: 1
    size: 1
    large_cap: 0
    graham: 0
    value_composite: 0
    float_ratio: 2
  top_n: 25

entry_conditions:
  - RSI(14) > 55 且近5日持续上升
  - 收盘价在 MA20 上方
  - 成交量近3日较前5日均量放大
  - 价格突破近10日高点

exit_conditions:
  - RSI(14) 跌破 45
  - 或收盘价跌破 MA20
  - 或盈利超过 18%
  - 或亏损超过 6%

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 5
    slow_period: 20

parameters:
  rsi_period: 14
  rsi_threshold: 55
  stop_loss_pct: 0.06
  take_profit_pct: 0.18

risk_notes: |
  RSI高位容易钝化，需配合量能确认，高位追涨须严格止损。
