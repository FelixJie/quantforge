name: sector_rotation
display_name: 板块轮动
description: |
  跟踪近 5 日板块资金流向，买入资金净流入最强的热点板块中的
  强势龙头股。适合政策驱动和题材爆发阶段的短线操作。

screener:
  category: momentum
  category_color: "#f97316"
  icon: refresh-cw
  risk: 高
  suitable: 板块轮动行情、政策催化期、资金明显流向特定板块时
  holding_period: 3-7天
  filters:
    min_price: 3.0
    max_pe: 200.0
    min_pe: 2.0
    min_change_pct: 2.0
  factor_weights:
    momentum: 10
    liquidity: 7
    size: 3
    float_ratio: 5
    value: 0
    pb: 0
    quality: 1
    large_cap: 0
    graham: 0
    value_composite: 0
  top_n: 15

entry_conditions:
  - 所属板块近 5 日资金净流入排名前 10%
  - 个股近 3 日涨幅高于板块平均（板块内相对强度领先）
  - 当日换手率 > 3%（活跃度足够）
  - 股价不低于 20 日均线
  - 流通市值低于 100 亿（弹性更大）

exit_conditions:
  - 板块资金净流入转为净流出
  - 个股涨幅明显落后板块平均（相对弱化）
  - 涨幅超过 10% 或跌幅超过 5%，触发止盈止损

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 5
    slow_period: 10

parameters:
  sector_inflow_rank_pct: 0.10
  turnover_min: 3.0
  float_cap_max: 100.0
  stop_loss_pct: 0.05
  take_profit_pct: 0.10
  max_hold_days: 7

risk_notes: |
  板块轮动行情节奏快，需每日跟踪资金流向变化，不能持仓不管。
  热门板块跟风末期风险极高，应在板块启动初期介入而非追高。
  单次仓位不超过总资金 10%，分散配置 2-3 个板块。
