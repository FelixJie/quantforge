name: state_owned_reform
display_name: 国企改革重估
description: |
  聚焦央企/国企在"中国特色估值体系"（中特估）框架下的价值重估机会。
  筛选 PB 极低、股息稳定、改革预期强烈的低估国企，
  等待政策催化下的估值修复行情。

screener:
  category: value
  category_color: "#dc2626"
  icon: building
  risk: 低中
  suitable: 国企改革深化期、中特估行情、政策托底市场阶段
  holding_period: 1-6个月
  filters:
    min_price: 3.0
    max_pe: 20.0
    min_pe: 3.0
    max_pb: 1.5
  factor_weights:
    value: 9
    pb: 9
    graham: 7
    value_composite: 6
    large_cap: 7
    quality: 5
    dividend_yield: 0
    liquidity: 4
    momentum: 1
    size: 0
    float_ratio: 1
  top_n: 20

entry_conditions:
  - 国有控股（国资委/地方国资直接持股 > 50%）
  - PB < 1.0（低于净资产，"破净"深度价值）
  - 近一年股息率 > 3%（有稳定现金回报）
  - ROE > 6%，不低于银行存款利率（盈利能力基本保障）
  - 近 3 个月有国企改革相关政策利好（专项规划/并购重组/混改等）

exit_conditions:
  - PB 修复至 1.5 以上（低估修复到位）
  - 股息率因股价上涨降至 2% 以下
  - 国企改革预期落空或政策转向

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 20
    slow_period: 60

parameters:
  state_owned: true
  pb_max: 1.0
  dividend_yield_min: 3.0
  roe_min: 6.0
  stop_loss_pct: 0.10
  take_profit_pct: 0.35

risk_notes: |
  国企改革节奏慢，需有耐心，不宜设置过短的时间止损。
  部分低PB国企因行业萎缩而长期低估，是真价值陷阱，需甄别。
  中特估行情具有政策驱动属性，涨跌均快，注意控制仓位。
