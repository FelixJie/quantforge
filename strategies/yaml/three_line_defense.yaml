name: three_line_defense
display_name: 三线防守反击
description: |
  在三条均线（MA5/MA20/MA60）形成多头排列但出现短期回调至
  MA20 支撑时买入，利用"多头排列 + 回踩均线"的经典形态，
  捕捉趋势中的高胜率买点。

screener:
  category: momentum
  category_color: "#059669"
  icon: triangle
  risk: 中
  suitable: 上升趋势中的回调、牛市中继整理、均线系统完整的强势股
  holding_period: 1-3周
  filters:
    min_price: 4.0
    max_pe: 100.0
    min_pe: 3.0
  factor_weights:
    momentum: 8
    quality: 4
    value: 3
    liquidity: 5
    pb: 2
    size: 2
    large_cap: 2
    graham: 1
    value_composite: 2
    float_ratio: 3
  top_n: 20

entry_conditions:
  - MA5 > MA20 > MA60 三线完整多头排列（趋势确认）
  - 股价回调至 MA20 附近（偏离范围 ±2%）
  - MA20 本身方向向上（均线仍在上行，非斜率转平）
  - 回调过程中成交量萎缩（量减价跌是正常回调）
  - MACD 在零轴之上，回调时未出现死叉（中期动能未转弱）

exit_conditions:
  - MA5 下穿 MA20（三线多头排列破坏）
  - 回调幅度超过 MA20 下方 5%（支撑失守）
  - 持有满 20 日后 MA20 仍未支撑则离场

execution:
  strategy_class: dual_ma
  strategy_params:
    fast_period: 5
    slow_period: 20

parameters:
  ma5_period: 5
  ma20_period: 20
  ma60_period: 60
  ma20_tolerance: 0.02
  ma20_slope_min: 0.0
  stop_loss_pct: 0.06
  take_profit_pct: 0.15
  max_hold_days: 20

risk_notes: |
  三线多头排列不代表永续上涨，需结合板块和大盘环境判断。
  若 MA60 也开始拐头向下，整体趋势已转弱，不宜再做此策略。
  建议在 MA20 首次回踩时入场（第一次最有效），多次回踩成功率下降。
