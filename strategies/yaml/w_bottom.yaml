name: w_bottom
display_name: W底形态
description: |
  经典 W 底（双底）K 线形态：两次探低价格相近，第二底成交量
  小于第一底，随后有效突破颈线位。形态完整则反转可信度高。

screener:
  category: reversal
  category_color: "#0891b2"
  icon: trending-up
  risk: 中
  suitable: 中期调整末期、底部区域形态确认、震荡筑底完成后
  holding_period: 2-6周
  filters:
    min_price: 3.0
    max_pe: 80.0
    min_pe: 3.0
    min_change_pct: -12.0
  factor_weights:
    momentum: -2
    value: 6
    quality: 5
    liquidity: 6
    size: 3
    pb: 3
    large_cap: 3
    graham: 2
    value_composite: 3
    float_ratio: 2
  top_n: 15

entry_conditions:
  - 近 40 日内出现两次明显低点，低点价格差异 < 3%（W 型底部）
  - 第二个低点成交量 < 第一个低点成交量的 80%（量减确认底部）
  - 股价有效突破两低之间的颈线（反弹高点），收盘站稳
  - 突破颈线时成交量放大 > 1.3 倍（量增确认突破有效性）
  - RSI 第二底高于第一底（同步出现底背离）

exit_conditions:
  - 颈线突破后，目标为颈线到底部的等幅上升（量度目标）
  - 重新跌回颈线以下超过 3%（形态失效，止损）
  - 持有满 30 日

execution:
  strategy_class: mean_reversion
  strategy_params:
    period: 20
    std_threshold: 1.5

parameters:
  w_bottom_period: 40
  two_lows_diff_max: 3.0
  volume_ratio_2nd_to_1st: 0.80
  breakout_volume_ratio: 1.30
  stop_loss_pct: 0.05
  take_profit_pct: 0.15
  max_hold_days: 30

risk_notes: |
  W 底识别有主观成分，建议严格执行颈线突破确认，不提前入场。
  假突破（突破后次日即回落）是最常见失败形式，需设紧止损。
  W 底适用于有一定波动的个股，长期横盘的无趋势股不适用。
